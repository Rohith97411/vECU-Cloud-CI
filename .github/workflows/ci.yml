name: vECU CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Compile vECU
        run: gcc vecu.c -o vecu

      - name: Run Test - Safe Speed
        run: ./vecu 80

      - name: Run Test - Overspeed
        run: ./vecu 120