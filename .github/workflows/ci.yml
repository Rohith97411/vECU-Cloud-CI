name: vECU CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Compile
        run: gcc vecu.c -o vecu

      - name: Test Safe Speed
        run: |
          output=$(./vecu 80)
          echo "$output"
          echo "$output" | grep "Within Safe Limit"

      - name: Test Overspeed
        run: |
          output=$(./vecu 120)
          echo "$output"
          echo "$output" | grep "Overspeed Detected"