name: vECU CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Compile
        run: gcc vecu.c -o vecu

      - name: Test Safe Speed
        run: |
          output=$(./vecu 80)
          echo "$output"
          echo "$output" | grep "Within Safe Limit"

      - name: Test Overspeed
        run: |
          output=$(./vecu 120)
          echo "$output"
          echo "$output" | grep "Overspeed Detected"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vecu-binary
          path: vecu

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: vecu-binary

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p ~/vecu
            echo "Deployment started..."